services:
  db:
    image: postgres:16-alpine
    container_name: medpredict-db
    environment:
      POSTGRES_DB: medpredict
      POSTGRES_USER: medpredict
      POSTGRES_PASSWORD: medpredictpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medpredict -d medpredict"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: medpredict-backend
    container_name: medpredict-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    image: medpredict-frontend
    container_name: medpredict-frontend
    build:
      context: ./frontend/
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data: